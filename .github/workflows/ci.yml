name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: |
          set -euo pipefail
          python -m compileall -q -x '(^|/)(\.git|\.venv|venv|__pycache__)(/|$)' .
